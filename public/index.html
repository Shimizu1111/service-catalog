<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サービスカタログ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1>サービスカタログ</h1>
    <div class="header-actions"></div>
  </header>

  <div class="toolbar">
    <input type="text" class="search-box" id="searchBox" placeholder="サービスを検索...">
    <div id="filterButtons"></div>
    <div id="recommendedFilters"></div>
    <div id="industryFilter"></div>
    <span class="service-count" id="serviceCount"></span>
  </div>

  <div class="grid" id="serviceGrid"></div>


  <a class="fab-contact" href="https://example.com/lp" target="_blank">
    <span class="fab-icon">&#10132;</span>
    <span class="fab-text">自分で作りたい方はこちら</span>
  </a>

  <script src="app.js"></script>
</body>
</html>
